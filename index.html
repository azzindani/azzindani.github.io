<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal portfolio and blog - Data Science, ML & AI projects">
    <meta name="author" content="Your Name">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Neural network background canvas -->
    <canvas id="neural-bg"></canvas>

    <!-- Reading progress bar -->
    <div class="reading-progress" id="reading-progress"></div>

    <!-- Navigation — minimal top bar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#/" class="nav-logo" aria-label="Home">
                <span class="logo-icon">&#9670;</span>
                <span class="logo-text">Portfolio</span>
            </a>
            <div class="nav-search" id="nav-search">
                <span class="nav-search-icon">&#128269;</span>
                <input type="text" id="global-search" placeholder="Search posts..." autocomplete="off">
            </div>
            <div class="nav-actions">
                <a href="#/" class="nav-action-btn" aria-label="Feed" title="Feed">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </a>
                <a href="#/admin" class="nav-action-btn" aria-label="Admin" title="Admin">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main App Container -->
    <div id="app" class="app-container"></div>

    <!-- Footer -->
    <footer class="footer" id="footer">
        <div class="footer-container">
            <div class="footer-content">
                <div class="footer-left">
                    <a href="#/" class="footer-logo">
                        <span class="logo-icon">&#9670;</span> Portfolio
                    </a>
                    <p class="footer-text">A personal space for sharing projects, ideas, and explorations in data science and AI.</p>
                </div>
                <div class="footer-links">
                    <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://linkedin.com/in/yourprofile" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                    <a href="mailto:user@example.com">Email</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Portfolio. Built with care.</p>
            </div>
        </div>
    </footer>

    <!-- Back to top -->
    <button class="back-to-top" id="back-to-top" aria-label="Back to top">&#8593;</button>

    <!-- Toast notification -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Only marked.js loaded eagerly (tiny). Highlight.js & PDF.js loaded on demand. -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

    <!-- App Scripts -->
    <script src="js/neural-bg.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
