<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal portfolio and blog - Data Science, ML & AI projects">
    <meta name="author" content="Azzindani">
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Portfolio">
    <meta property="og:title" content="Portfolio">
    <meta property="og:description" content="Personal portfolio and blog - Data Science, ML & AI projects">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Portfolio">
    <meta name="twitter:description" content="Personal portfolio and blog - Data Science, ML & AI projects">
    <link rel="canonical" href="https://azzindani.github.io/">
    <link rel="alternate" type="application/rss+xml" title="Portfolio — RSS" href="/feed.xml">
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Apply persisted theme before paint to avoid flash of incorrect theme -->
    <script>
        (function() {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'light' || t === 'dark') {
                    document.documentElement.setAttribute('data-theme', t);
                }
            } catch (e) { /* no-op */ }
        })();
    </script>
</head>
<body>
    <!-- Skip link for keyboard / screen-reader users -->
    <a href="#app" class="skip-link">Skip to content</a>

    <!-- Neural network background canvas -->
    <canvas id="neural-bg" aria-hidden="true"></canvas>

    <!-- Reading progress bar -->
    <div class="reading-progress" id="reading-progress"></div>

    <!-- Navigation — minimal top bar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#/" class="nav-logo" aria-label="Home">
                <span class="logo-icon">&#9670;</span>
                <span class="logo-text">Portfolio</span>
            </a>
            <div class="nav-tabs" id="nav-tabs">
                <a href="#/" class="nav-tab" data-tab="projects">Projects</a>
                <a href="#/blog" class="nav-tab" data-tab="blog">Blog</a>
                <a href="#/docs" class="nav-tab" data-tab="docs">Docs</a>
            </div>
            <div class="nav-search" id="nav-search">
                <span class="nav-search-icon">&#128269;</span>
                <input type="text" id="global-search" placeholder="Search posts..." autocomplete="off">
            </div>
            <div class="nav-actions">
                <button class="nav-action-btn nav-mobile-menu" id="nav-mobile-menu" aria-label="Menu" title="Menu">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <button class="nav-action-btn" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <a href="#/admin" class="nav-action-btn" data-tab="admin" aria-label="Admin" title="Admin">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </a>
            </div>
        </div>
        <!-- Mobile drawer (toggled by .nav-mobile-menu) -->
        <div class="nav-mobile-drawer" id="nav-mobile-drawer" hidden>
            <a href="#/" class="nav-tab" data-tab="projects">Projects</a>
            <a href="#/blog" class="nav-tab" data-tab="blog">Blog</a>
            <a href="#/docs" class="nav-tab" data-tab="docs">Docs</a>
            <a href="#/collections" class="nav-tab">Collections</a>
        </div>
    </nav>

    <!-- Main App Container -->
    <main id="app" class="app-container" tabindex="-1"></main>

    <!-- Footer -->
    <footer class="footer" id="footer">
        <div class="footer-container">
            <div class="footer-content">
                <div class="footer-left">
                    <a href="#/" class="footer-logo">
                        <span class="logo-icon">&#9670;</span> Portfolio
                    </a>
                    <p class="footer-text">A personal space for sharing projects, ideas, and explorations in data science and AI.</p>
                </div>
                <div class="footer-links">
                    <a href="https://github.com/azzindani" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://linkedin.com/in/azzindani" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                    <a href="mailto:user@example.com">Email</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Portfolio. Built with care.</p>
            </div>
        </div>
    </footer>

    <!-- Back to top -->
    <button class="back-to-top" id="back-to-top" aria-label="Back to top">&#8593;</button>

    <!-- Toast notification -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Only marked.js loaded eagerly (tiny). Highlight.js & PDF.js loaded on demand. -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">

    <!-- App Scripts -->
    <script src="js/lib/pure.js"></script>
    <script src="js/neural-bg.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
