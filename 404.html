<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8f9fa;
            color: #1a1a2e;
            text-align: center;
            padding: 24px;
        }
        h1 { font-size: 4rem; font-weight: 800; margin-bottom: 8px; color: #2563eb; }
        p { color: #586069; margin-bottom: 24px; font-size: 1.1rem; }
        a {
            display: inline-block;
            padding: 12px 28px;
            background: #2563eb;
            color: #fff;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        a:hover { background: #1d4ed8; }
    </style>
    <!-- Redirect to SPA -->
    <script>
        // If this 404 page is hit, redirect to the SPA with the path as a hash
        const path = window.location.pathname;
        if (path && path !== '/' && path !== '/404.html') {
            window.location.replace('/#' + path);
        }
    </script>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>This page doesn't exist. Let's get you back on track.</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
